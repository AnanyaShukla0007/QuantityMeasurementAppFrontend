<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — QuantaMeasure</title>

  <!-- FIXED -->
  <link rel="stylesheet" href="../CSS/styles.css" />
</head>

<body class="auth-page">

<div class="auth-layout">

  <div class="auth-panel auth-panel--left">
    <div class="panel-body">
      <h2 class="panel-title">Measurement Dashboard</h2>
      <p class="panel-sub">Perform real operations using backend APIs.</p>

      <button class="btn-primary" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="auth-panel auth-panel--right">
    <div class="auth-form-wrap">

      <div class="auth-header">
        <h1>Convert Measurement</h1>
      </div>

      <div class="form-row">
        <input type="number" id="val" placeholder="Value" />
      </div>

      <div class="form-row">
        <input type="text" id="from" placeholder="From Unit (e.g. meter)" />
      </div>

      <div class="form-row">
        <input type="text" id="to" placeholder="To Unit (e.g. cm)" />
      </div>

      <button class="btn-submit" onclick="runConvert()">Convert</button>

      <div style="margin-top:20px;">
        <strong>Result:</strong>
        <div id="result"></div>
      </div>

      <hr style="margin:30px 0; border-color:#1a2d4a;">

      <h2>History</h2>
      <div id="history"></div>

    </div>
  </div>

</div>

<!-- FIXED -->
<script type="module" src="../JS/dashboard.js"></script>
</body>
</html>
